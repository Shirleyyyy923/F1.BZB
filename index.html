<html lang="zh-Hans">

  <body>
    <main class="shell">
      <section class="topbar" aria-label="系统入口">

        <div class="live-pill" aria-live="polite">
          <span></span>

        </div>
      </section>

      <section class="course-links" aria-label="年级入口">
        <a class="course-link" href="f1.html">
          <span>FORM 1</span>
          <strong>F1 Counter 抢位系统</strong>
          <em>B5 / B6 座位图</em>

        <a class="course-link" href="f5.html">
          <span>FORM 5</span>
          <strong>F5 Counter 抢位系统</strong>
